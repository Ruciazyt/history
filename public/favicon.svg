<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer ring (compass) -->
  <circle cx="16" cy="16" r="14" stroke="#B45309" stroke-width="2" fill="#FEF3C7"/>
  <!-- Cardinal tick marks -->
  <line x1="16" y1="2" x2="16" y2="5" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="27" x2="16" y2="30" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="5" y2="16" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="16" x2="30" y2="16" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal tick marks -->
  <line x1="6.1" y1="6.1" x2="8.1" y2="8.1" stroke="#D97706" stroke-width="1" stroke-linecap="round"/>
  <line x1="23.9" y1="23.9" x2="25.9" y2="25.9" stroke="#D97706" stroke-width="1" stroke-linecap="round"/>
  <line x1="25.9" y1="6.1" x2="23.9" y2="8.1" stroke="#D97706" stroke-width="1" stroke-linecap="round"/>
  <line x1="6.1" y1="25.9" x2="8.1" y2="23.9" stroke="#D97706" stroke-width="1" stroke-linecap="round"/>
  <!-- Compass needle (N/S) -->
  <polygon points="16,5 19,16 16,19 13,16" fill="#DC2626"/>
  <polygon points="16,27 13,16 16,13 19,16" fill="#F59E0B"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#B45309"/>
</svg>
